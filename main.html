// ========== Materials Manager ==========
class MaterialsManager {
  constructor() {
    this.materials = {};
    this.createMaterials();
  }

  createMaterials() {
    this.materials.concrete = new THREE.MeshStandardMaterial({ color: 0xbfdbfe, roughness: 0.85, metalness: 0.1 });
    this.materials.steelRed = new THREE.MeshStandardMaterial({ color: 0xb91c1c, roughness: 0.4, metalness: 0.6 });
    this.materials.steelGrey = new THREE.MeshStandardMaterial({ color: 0x64748b, roughness: 0.5, metalness: 0.7 });
    this.materials.steelBrown = new THREE.MeshStandardMaterial({ color: 0x78350f, roughness: 0.6, metalness: 0.5 });
    this.materials.safetyYellow = new THREE.MeshStandardMaterial({ color: 0xfacc15, roughness: 0.5, metalness: 0.3 });
    this.materials.water = new THREE.MeshPhysicalMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.75, roughness: 0.1, metalness: 0.1, transmission: 0.6, ior: 1.33 });
    this.materials.dirtyWater = new THREE.MeshPhysicalMaterial({ color: 0x64748b, transparent: true, opacity: 0.8, roughness: 0.3, metalness: 0.1 });
    this.materials.pipeGlow = new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.8 });
    this.materials.uvGlow = new THREE.MeshBasicMaterial({ color: 0x8b5cf6, transparent: true, opacity: 0.9 });
    this.materials.aopGlow = new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.85 });
    this.materials.biogasFlame = new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.8 });
    this.materials.sludgePipe = new THREE.MeshBasicMaterial({ color: 0x78350f, transparent: true, opacity: 0.9 });
    
    // Ripple Material for Click Feedback
    this.materials.ripple = new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.0, side: THREE.DoubleSide });
  }

  get(name) { return this.materials[name] || this.materials.concrete; }
}

// ========== Telemetry AI ==========
class TelemetryAI {
  constructor() {
    this.values = new Map();
    this.history = new Map();
    this.maxHistory = 50;
  }

  register(key, min, max, initial) {
    this.values.set(key, { current: initial || (min + max) / 2, min, max, trend: 0 });
    this.history.set(key, []);
  }

  next(key, min, max) {
    if (!this.values.has(key)) { this.register(key, min, max); }
    const data = this.values.get(key);
    const range = max - min;
    data.trend += (Math.random() - 0.5) * 0.1;
    data.trend = Math.max(-0.5, Math.min(0.5, data.trend));
    data.current += data.trend * range * 0.05;
    data.current = Math.max(min, Math.min(max, data.current));
    const hist = this.history.get(key);
    hist.push(data.current);
    if (hist.length > this.maxHistory) { hist.shift(); }
    return data.current;
  }

  get(key) { return this.values.has(key) ? this.values.get(key).current : 0; }
  getHistory(key) { return this.history.get(key) || []; }

  generateScreeningTelemetry() { return { "Flow In": () => `${this.next('screening_flow', 1100, 1300).toFixed(0)} m³/h`, "Screen Status": () => "OPERATIONAL", "Debris Removed": () => `${this.next('screening_debris', 40, 60).toFixed(1)} kg/h`, "Uptime": () => "99.2%" }; }
  generateGritTelemetry() { return { "Flow Rate": () => `${this.next('grit_flow', 1050, 1250).toFixed(0)} m³/h`, "Grit Removed": () => `${this.next('grit_removed', 30, 50).toFixed(1)} kg/h`, "Velocity": () => `${this.next('grit_velocity', 0.25, 0.35).toFixed(2)} m/s`, "Efficiency": () => `${this.next('grit_eff', 85, 95).toFixed(1)}%` }; }
  generatePSTTelemetry() { return { "Flow In": () => `${this.next('pst_flow', 550, 650).toFixed(0)} m³/h`, "TSS Removal": () => `${this.next('pst_tss', 50, 65).toFixed(1)}%`, "Sludge Level": () => `${this.next('pst_sludge', 1.0, 2.0).toFixed(2)} m`, "Efficiency": () => `${this.next('pst_eff', 88, 96).toFixed(1)}%` }; }
  generateDAFTelemetry() { return { "Flow Rate": () => `${this.next('daf_flow', 500, 600).toFixed(0)} m³/h`, "Air Pressure": () => `${this.next('daf_pressure', 4, 6).toFixed(1)} bar`, "Float Removal": () => `${this.next('daf_removal', 70, 85).toFixed(1)}%`, "Clarity": () => `${this.next('daf_clarity', 85, 95).toFixed(1)}%` }; }
  generateAerationTelemetry() { return { "Flow In": () => `${this.next('aer_flow', 540, 620).toFixed(0)} m³/h`, "DO Level": () => `${this.next('aer_do', 1.8, 3.5).toFixed(2)} mg/L`, "MLSS": () => `${this.next('aer_mlss', 2800, 3800).toFixed(0)} mg/L`, "BOD Removal": () => `${this.next('aer_bod', 92, 97).toFixed(1)}%` }; }
  generateBiofilterTelemetry() { return { "Flow Rate": () => `${this.next('bf_flow', 520, 600).toFixed(0)} m³/h`, "BOD Removal": () => `${this.next('bf_bod', 80, 92).toFixed(1)}%`, "Biofilm Depth": () => `${this.next('bf_biofilm', 1.5, 3.0).toFixed(1)} mm`, "Efficiency": () => `${this.next('bf_eff', 85, 94).toFixed(1)}%` }; }
  generateMBRTelemetry() { return { "Flow Rate": () => `${this.next('mbr_flow', 500, 580).toFixed(0)} m³/h`, "TMP": () => `${this.next('mbr_tmp', 0.3, 0.8).toFixed(2)} bar`, "Permeability": () => `${this.next('mbr_perm', 200, 400).toFixed(0)} LMH/bar`, "Turbidity": () => `${this.next('mbr_turb', 0.1, 0.5).toFixed(2)} NTU` }; }
  generateNutrientTelemetry() { return { "Flow Rate": () => `${this.next('nr_flow', 480, 560).toFixed(0)} m³/h`, "NO₃-N": () => `${this.next('nr_no3', 2, 8).toFixed(1)} mg/L`, "PO₄-P": () => `${this.next('nr_po4', 0.5, 2.0).toFixed(2)} mg/L`, "Removal": () => `${this.next('nr_removal', 85, 95).toFixed(1)}%` }; }
  generateUVTelemetry() { return { "Flow In": () => `${this.next('uv_flow', 490, 570).toFixed(0)} m³/h`, "UV Dose": () => `${this.next('uv_dose', 35, 50).toFixed(1)} mJ/cm²`, "Lamp Status": () => "ALL ACTIVE", "E.coli Out": () => `<${Math.floor(this.next('uv_ecoli', 0, 5))} CFU/100mL` }; }
  generateAOPTelemetry() { return { "Flow Rate": () => `${this.next('aop_flow', 480, 560).toFixed(0)} m³/h`, "H₂O₂ Dose": () => `${this.next('aop_h2o2', 5, 15).toFixed(1)} mg/L`, "OH Radical": () => `${this.next('aop_oh', 1.5, 3.5).toFixed(2)} µM`, "COD Removal": () => `${this.next('aop_cod', 75, 90).toFixed(1)}%` }; }
  generateSludgeTelemetry() { return { "Digester Temp": () => `${this.next('dig_temp', 35, 38).toFixed(1)} °C`, "Biogas Prod": () => `${this.next('dig_gas', 800, 1200).toFixed(0)} m³/d`, "Solids Content": () => `${this.next('dig_solids', 3, 5).toFixed(1)} %`, "Methane": () => `${this.next('dig_ch4', 60, 65).toFixed(1)} %` }; }

// ========== Animation Manager ==========
class AnimationManager {
  constructor() { this.clock = new THREE.Clock(); }
  getDelta() { return this.clock.getDelta(); }
  getTime() { return this.clock.getElapsedTime(); }

  update(units, time, delta) {
    units.forEach(unit => {
      unit.traverse((child) => {
        const userData = child.userData;
        if (userData.rotating) { child.rotation.y += userData.rotationSpeed * delta; }
        if (userData.shimmer) { child.position.y = userData.baseY + Math.sin(time * 0.5 + child.position.x) * 0.08; }
        if (userData.aerate) { child.position.y = userData.baseY + Math.sin(time * 1.5 + child.position.x) * 0.15; }
        if (userData.uvGlow) { child.material.opacity = 0.7 + Math.sin(time * 4 + child.position.x) * 0.3; }
        if (userData.aopGlow) { child.material.opacity = 0.75 + Math.sin(time * 3 + child.position.x * 0.5) * 0.25; child.scale.setScalar(1 + Math.sin(time * 2) * 0.05); }
        if (userData.flowArrow) { child.position.y = child.userData.baseY + Math.sin(time * 2 + child.position.x) * 0.3; child.material.opacity = 0.4 + Math.sin(time * 3 + child.position.x) * 0.2; }
        if (userData.flowPipe) { child.material.opacity = 0.6 + Math.sin(time * 3) * 0.2; }
        if (userData.biogasFlame) { child.scale.setScalar(1 + Math.sin(time * 5) * 0.1); child.material.opacity = 0.6 + Math.sin(time * 8) * 0.3; }
      });
    });
  }
}

// ========== Flow System ==========
class FlowSystem {
  constructor(scene, materials) {
    this.scene = scene;
    this.materials = materials;
    this.flowParticles = [];
    this.waterPath = null;
    this.sludgeParticles = [];
    this.sludgePath = null;
  }

  createWaterFlow(waypoints) {
    this.waterPath = new THREE.CatmullRomCurve3(waypoints);
    const pipeGeometry = new THREE.TubeGeometry(this.waterPath, 300, 1.2, 8, false);
    const pipeMaterial = this.materials.get('pipeGlow').clone();
    const pipe = new THREE.Mesh(pipeGeometry, pipeMaterial);
    pipe.userData.flowPipe = true;
    this.scene.add(pipe);

    const particleGeometry = new THREE.SphereGeometry(0.6, 8, 8);
    const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.9 });
    for (let i = 0; i < 30; i++) {
      const particle = new THREE.Mesh(particleGeometry, particleMaterial.clone());
      particle.userData.progress = i / 30;
      particle.userData.speed = 0.03 + Math.random() * 0.02;
      this.scene.add(particle);
      this.flowParticles.push(particle);
    }
    this.createFlowArrows(this.waterPath, 0x60a5fa);
  }

  createSludgeFlow(waypoints) {
    this.sludgePath = new THREE.CatmullRomCurve3(waypoints);
    const pipeGeometry = new THREE.TubeGeometry(this.sludgePath, 150, 0.8, 8, false);
    const pipeMaterial = this.materials.get('sludgePipe').clone();
    const pipe = new THREE.Mesh(pipeGeometry, pipeMaterial);
    pipe.userData.flowPipe = true;
    this.scene.add(pipe);

    const particleGeometry = new THREE.SphereGeometry(0.5, 8, 8);
    const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x5d4037, transparent: true, opacity: 0.9 });
    for (let i = 0; i < 20; i++) {
      const particle = new THREE.Mesh(particleGeometry, particleMaterial.clone());
      particle.userData.progress = i / 20;
      particle.userData.speed = 0.02 + Math.random() * 0.01;
      this.scene.add(particle);
      this.sludgeParticles.push(particle);
    }
    this.createFlowArrows(this.sludgePath, 0x78350f);
  }

  createFlowArrows(path, color) {
    const arrowGeometry = new THREE.ConeGeometry(0.5, 1.5, 3);
    const arrowMaterial = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
    const points = path.getPoints(50);
    for (let i = 0; i < points.length; i += 5) {
      const arrow = new THREE.Mesh(arrowGeometry, arrowMaterial.clone());
      arrow.position.copy(points[i]);
      arrow.position.y += 3;
      if (i < points.length - 1) {
        const direction = new THREE.Vector3().subVectors(points[i + 1], points[i]).normalize();
        arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
      }
      arrow.userData.flowArrow = true;
      arrow.userData.baseY = arrow.position.y;
      this.scene.add(arrow);
    }
  }

  update(time, delta) {
    this.flowParticles.forEach(particle => {
      particle.userData.progress += particle.userData.speed * delta;
      if (particle.userData.progress > 1) { particle.userData.progress = 0; }
      if (this.waterPath) {
        const point = this.waterPath.getPointAt(particle.userData.progress);
        particle.position.copy(point);
        particle.material.opacity = 0.7 + Math.sin(time * 5 + particle.userData.progress * 10) * 0.3;
      }
    });

    this.sludgeParticles.forEach(particle => {
        particle.userData.progress += particle.userData.speed * delta;
        if (particle.userData.progress > 1) { particle.userData.progress = 0; }
        if (this.sludgePath) {
            const point = this.sludgePath.getPointAt(particle.userData.progress);
            particle.position.copy(point);
        }
    });
  }
}

// ========== Ripple Effect Helper ==========
class RippleEffect {
  constructor(scene, materials) {
    this.scene = scene;
    this.material = materials.get('ripple').clone();
    this.mesh = new THREE.Mesh(new THREE.RingGeometry(0.5, 1, 32), this.material);
    this.mesh.rotation.x = -Math.PI / 2;
    this.mesh.visible = false;
    this.scene.add(this.mesh);
  }

  play(x, z) {
    this.mesh.position.set(x, 0.5, z);
    this.mesh.scale.set(1, 1, 1);
    this.mesh.visible = true;
    this.material.opacity = 1.0;

    new TWEEN.Tween(this.mesh.scale)
      .to({ x: 5, y: 5 }, 800)
      .easing(TWEEN.Easing.Cubic.Out)
      .start();

    new TWEEN.Tween(this.material)
      .to({ opacity: 0 }, 800)
      .easing(TWEEN.Easing.Quadratic.Out)
      .onComplete(() => { this.mesh.visible = false; })
      .start();
  }
}

class SCADAPanel {
  constructor() {
    this.panel = null; this.currentUnit = null; this.telemetry = null; this.updateInterval = null; this.createPanel();
  }

  createPanel() {
    this.panel = document.createElement('div');
    this.panel.className = 'scada-panel hidden';
    this.panel.innerHTML = `
      <div class="panel-header"><div><div class="panel-title" id="scada-title">UNIT NAME</div><div class="panel-id">ID: <span id="scada-id">--</span></div></div><div class="status-badge" id="scada-status">ACTIVE</div></div>
      <div class="panel-body"><p class="panel-desc" id="scada-desc">Unit description...</p><div class="telemetry-section"><div class="section-title">LIVE TELEMETRY</div><div class="telemetry-grid" id="telemetry-grid"></div></div><div class="telemetry-section"><div class="section-title">TREND ANALYSIS</div><div class="chart-container"><canvas class="chart-canvas" id="trend-chart"></canvas></div></div><button class="close-btn" id="close-scada">CLOSE INSPECTION</button></div>`;
    document.getElementById('app').appendChild(this.panel);
    document.getElementById('close-scada').addEventListener('click', () => { this.hide(); window.dispatchEvent(new CustomEvent('scada-close')); });
  }

  show(unit, telemetry) {
    this.currentUnit = unit; this.telemetry = telemetry; this.panel.classList.remove('hidden');
    document.getElementById('scada-title').textContent = unit.userData.name;
    document.getElementById('scada-id').textContent = unit.userData.id;
    document.getElementById('scada-desc').textContent = unit.userData.desc;
    this.updateTelemetry();
    if (this.updateInterval) { clearInterval(this.updateInterval); }
    this.updateInterval = setInterval(() => this.updateTelemetry(), 2000);
  }

  hide() { this.panel.classList.add('hidden'); if (this.updateInterval) { clearInterval(this.updateInterval); this.updateInterval = null; } }

  updateTelemetry() {
    if (!this.currentUnit || !this.telemetry) return;
    const grid = document.getElementById('telemetry-grid'); grid.innerHTML = '';
    const telemetryData = this.currentUnit.userData.telemetry;
    if (!telemetryData) return;
    Object.entries(telemetryData).forEach(([label, valueFn]) => {
      const box = document.createElement('div'); box.className = 'metric-box'; const value = valueFn();
      box.innerHTML = `<div class="metric-label">${label}</div><div class="metric-value">${value}</div>`;
      grid.appendChild(box);
    });
    this.updateChart();
  }

  updateChart() {
    const canvas = document.getElementById('trend-chart'); if (!canvas) return;
    const ctx = canvas.getContext('2d'); const width = canvas.width = canvas.offsetWidth; const height = canvas.height = canvas.offsetHeight;
    ctx.clearRect(0, 0, width, height); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2; ctx.beginPath();
    const points = 50; for (let i = 0; i < points; i++) { const x = (i / points) * width; const y = height / 2 + Math.sin(i * 0.2) * 20 + Math.random() * 10; if (i === 0) { ctx.moveTo(x, y); } else { ctx.lineTo(x, y); } } ctx.stroke();
    ctx.strokeStyle = 'rgba(59, 130, 246, 0.2)'; ctx.lineWidth = 1; for (let i = 0; i < 5; i++) { const y = (i / 4) * height; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
  }
}

// ========== Minimap ==========
class MinimapManager {
  constructor() { this.canvas = null; this.ctx = null; this.units = []; this.camera = null; this.controls = null; this.hoveredUnit = null; }
  setup(units, camera, controls) {
    this.units = units; this.camera = camera; this.controls = controls;
    const container = document.createElement('div'); container.className = 'minimap';
    const title = document.createElement('div'); title.className = 'minimap-title'; title.textContent = 'PLANT MAP'; container.appendChild(title);
    this.canvas = document.createElement('canvas'); this.canvas.className = 'minimap-canvas'; this.canvas.width = 240; this.canvas.height = 144; container.appendChild(this.canvas);
    document.getElementById('app').appendChild(container); this.ctx = this.canvas.getContext('2d');
    this.canvas.addEventListener('click', (e) => this.onClick(e)); this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
  }
  onClick(e) { const rect = this.canvas.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; const unit = this.getUnitAtPosition(x, y); if (unit) { window.dispatchEvent(new CustomEvent('unit-inspect', { detail: unit })); } }
  onMouseMove(e) { const rect = this.canvas.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; this.hoveredUnit = this.getUnitAtPosition(x, y); }
  getUnitAtPosition(x, y) { for (const unit of this.units) { const mapPos = this.worldToMap(unit.position); const dist = Math.sqrt(Math.pow(x - mapPos.x, 2) + Math.pow(y - mapPos.y, 2)); if (dist < 8) { return unit; } } return null; }
  worldToMap(worldPos) { const scale = 0.3; return { x: this.canvas.width / 2 + worldPos.x * scale, y: this.canvas.height / 2 + worldPos.z * scale }; }
  update(camera) {
    if (!this.ctx) return; const ctx = this.ctx; ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.units.forEach(unit => { const pos = this.worldToMap(unit.position); const isHovered = unit === this.hoveredUnit; ctx.fillStyle = isHovered ? '#60a5fa' : '#3b82f6'; ctx.strokeStyle = isHovered ? '#93c5fd' : '#2563eb'; ctx.lineWidth = isHovered ? 2 : 1; ctx.beginPath(); ctx.arc(pos.x, pos.y, isHovered ? 6 : 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); });
    const camPos = this.worldToMap(camera.position); ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(camPos.x, camPos.y, 8, 0, Math.PI * 2); ctx.stroke();
  }
}

    this.addUnit(new GritChamber(this.materials, this.telemetry), -160, 0);
    this.addUnit(new PST(this.materials, this.telemetry, "PST-01", "Primary Clarifier 1"), -120, -25);
    this.addUnit(new PST(this.materials, this.telemetry, "PST-02", "Primary Clarifier 2"), -120, 25);
    this.addUnit(new Flotation(this.materials, this.telemetry), -80, 0);
    this.addUnit(new Aeration(this.materials, this.telemetry, "AB-01", "Aeration Basin 1"), -40, -30);
    this.addUnit(new Aeration(this.materials, this.telemetry, "AB-02", "Aeration Basin 2"), -40, 30);
    this.addUnit(new BioFilter(this.materials, this.telemetry), 0, 0);
    this.addUnit(new NutrientRemoval(this.materials, this.telemetry), 80, -25); 
    this.addUnit(new MBR(this.materials, this.telemetry), 110, 0); 
    this.addUnit(new UVSystem(this.materials, this.telemetry), 140, 0);
    this.addUnit(new AOP(this.materials, this.telemetry), 165, 0);
    this.addUnit(new Thickener(this.materials, this.telemetry), -100, -100);
    this.addUnit(new Digester(this.materials, this.telemetry), -50, -100);
    this.addUnit(new DewateringBuilding(this.materials, this.telemetry), 10, -100);

    this.labels.createPhaseLabel(this.scene, "PRIMARY TREATMENT", -140, -70);
    this.labels.createPhaseLabel(this.scene, "SECONDARY / BIOLOGICAL", 0, -70);
    this.labels.createPhaseLabel(this.scene, "TERTIARY POLISHING", 130, -70);
    this.labels.createPhaseLabel(this.scene, "SLUDGE & SOLIDS HANDLING", -50, -130);

    this.createFlowPaths();
  }

  addUnit(unitInstance, x, z) {
    const unit = unitInstance.create(); unit.position.set(x, 0, z); this.scene.add(unit); this.units.push(unit);
    if (unitInstance.target) { this.interactables.push(unitInstance.target); }
    this.labels.createUnitLabel(unit, unit.userData.name, (u) => { window.dispatchEvent(new CustomEvent('unit-inspect', { detail: u })); });
  }

  createFlowPaths() {
    const waterWaypoints = [
      new THREE.Vector3(-200, 2, 0), new THREE.Vector3(-190, 2, 0), new THREE.Vector3(-160, 2, 0), new THREE.Vector3(-120, 2, -25), new THREE.Vector3(-120, 2, 25), new THREE.Vector3(-80, 2, 0), new THREE.Vector3(-40, 2, -30), new THREE.Vector3(-40, 2, 30), new THREE.Vector3(0, 2, 0), 
      new THREE.Vector3(40, 2, 30), new THREE.Vector3(80, 2, -25), new THREE.Vector3(110, 2, 0), 
      new THREE.Vector3(140, 2, 0), new THREE.Vector3(165, 2, 0), new THREE.Vector3(190, 2, 0), new THREE.Vector3(220, 0, -150)
    ];
    this.flowSystem.createWaterFlow(waterWaypoints);
    
    const sludgeWaypoints = [
        new THREE.Vector3(-120, 1, -25), new THREE.Vector3(-120, 1, -80), new THREE.Vector3(-100, 1, -100), new THREE.Vector3(-50, 1, -100), new THREE.Vector3(10, 1, -100)
    ];
    this.flowSystem.createSludgeFlow(sludgeWaypoints);
  }
}

// ========== Main Application ==========
class WWTPSimulation {
  constructor() { this.init(); }
  async init() {
    this.showLoader();
    this.sceneManager = new SceneManager(); this.scene = this.sceneManager.scene;
    this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000); this.camera.position.set(0, 200, 300);
    const container = document.createElement('div'); container.id = 'canvas-container'; document.getElementById('app').appendChild(container);
    this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' }); this.renderer.setSize(window.innerWidth, window.innerHeight); this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); this.renderer.shadowMap.enabled = true; this.renderer.shadowMap.type = THREE.PCFSoftShadowMap; this.renderer.toneMapping = THREE.ACESFilmicToneMapping; this.renderer.toneMappingExposure = 1.0; container.appendChild(this.renderer.domElement);
    const labelsContainer = document.createElement('div'); labelsContainer.id = 'labels-container'; document.getElementById('app').appendChild(labelsContainer);
    this.labelRenderer = new CSS2DRenderer(); this.labelRenderer.setSize(window.innerWidth, window.innerHeight); labelsContainer.appendChild(this.labelRenderer.domElement);
    const canvasElement = this.renderer.domElement; this.controls = new OrbitControls(this.camera, canvasElement); this.controls.enableDamping = true; this.controls.dampingFactor = 0.05; this.controls.maxPolarAngle = Math.PI / 2 - 0.05; this.controls.minDistance = 10; this.controls.maxDistance = 800;
    
    const sun = new THREE.DirectionalLight(0xfff5e6, 1.8); sun.position.set(-150, 200, 100); sun.castShadow = true; sun.shadow.mapSize.set(4096, 4096); sun.shadow.camera.left = -300; sun.shadow.camera.right = 300; sun.shadow.camera.top = 300; sun.shadow.camera.bottom = -300; this.scene.add(sun);
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8d99ae, 0.6); this.scene.add(hemiLight);
    const ambient = new THREE.AmbientLight(0xffffff, 0.3); this.scene.add(ambient);
    
    this.composer = new EffectComposer(this.renderer); this.composer.addPass(new RenderPass(this.scene, this.camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85); bloomPass.threshold = 0.7; bloomPass.strength = 0.8; bloomPass.radius = 0.5; this.composer.addPass(bloomPass);

    this.materials = new MaterialsManager(); this.telemetry = new TelemetryAI(); this.flowSystem = new FlowSystem(this.scene, this.materials); this.animations = new AnimationManager(); this.labels = new LabelsManager(); this.scada = new SCADAPanel(); this.minimap = new MinimapManager();
    this.plantBuilder = new PlantBuilder(this.scene, this.materials, this.labels, this.flowSystem, this.telemetry);
    await this.plantBuilder.build();

    // Initialize Ripple Effect
    this.ripple = new RippleEffect(this.scene, this.materials);

    this.setupUI(); this.setupInteractions();
    this.minimap.setup(this.plantBuilder.units, this.camera, this.controls);
    window.addEventListener('resize', () => this.onResize());
    this.hideLoader(); this.fitToScene(); this.animate();
  }

  setupUI() {
    const header = document.createElement('div'); header.className = 'header'; header.innerHTML = `<h1>WWTP Digital Twin</h1><div class="subtitle"><div class="live-dot"></div>FULL PROCESS SIMULATION • REAL-TIME</div>`; document.getElementById('app').appendChild(header);
    const controlsDiv = document.createElement('div'); controlsDiv.className = 'camera-controls';
    controlsDiv.innerHTML = `<button class="cam-btn active" data-view="overview">Plant Overview</button><button class="cam-btn" data-view="primary">Primary</button><button class="cam-btn" data-view="secondary">Secondary</button><button class="cam-btn" data-view="tertiary">Tertiary</button><button class="cam-btn" data-view="sludge">Sludge Line</button><button class="cam-btn" data-view="top">Top View</button><button class="cam-btn" data-view="side">Side View</button>`;
    document.getElementById('app').appendChild(controlsDiv);
    this.buttons = controlsDiv.querySelectorAll('.cam-btn'); this.buttons.forEach(btn => { btn.addEventListener('click', () => this.onCameraButton(btn)); });
    window.addEventListener('scada-close', () => { this.fitToScene(); this.setActiveButton('overview'); });
  }

  onCameraButton(btn) {
    const view = btn.dataset.view; this.setActiveButton(view); this.scada.hide();
    switch (view) {
      case 'overview': this.fitToScene(); break;
      case 'primary': this.viewPhase(-200, -70); break;
      case 'secondary': this.viewPhase(-60, 20); break;
      case 'tertiary': this.viewPhase(70, 180); break;
      case 'sludge': this.viewSludge(); break;
      case 'top': this.topView(); break;
      case 'side': this.sideView(); break;
    }
  }

  setActiveButton(view) { this.buttons.forEach(b => b.classList.remove('active')); const btn = Array.from(this.buttons).find(b => b.dataset.view === view); if (btn) btn.classList.add('active'); }
  
  // UPDATED INTERACTION LOGIC (RTS STYLE)
  setupInteractions() {
    const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
    window.addEventListener('pointerdown', (e) => {
      // Ignore clicks on UI elements
      if (e.target.closest('button') || e.target.closest('.scada-panel') || e.target.closest('.minimap')) { return; }
      
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1; 
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; 
      raycaster.setFromCamera(mouse, this.camera); 
      
      // Check for Units first (Higher priority)
      const unitHits = raycaster.intersectObjects(this.plantBuilder.interactables, true); 
      if (unitHits.length) { 
        let target = unitHits[0].object; 
        while (target.parent && !this.plantBuilder.units.includes(target)) { target = target.parent; } 
        if (this.plantBuilder.units.includes(target)) { this.inspectUnit(target); return; } // Exit if unit clicked
      }

      // If no unit, check for Ground (Movement)
      if (this.sceneManager.ground) {
        const groundHits = raycaster.intersectObject(this.sceneManager.ground);
        if (groundHits.length > 0) {
            const point = groundHits[0].point;
            this.moveToPoint(point);
            this.ripple.play(point.x, point.z); // Visual feedback
        }
      }
    });
    
    window.addEventListener('unit-inspect', (e) => { this.inspectUnit(e.detail); });
  }

  // RTS MOVEMENT LOGIC
  moveToPoint(targetPoint) {
    // Keep current relative offset to maintain view angle
    const offset = new THREE.Vector3().subVectors(this.camera.position, this.controls.target);
    const newCamPos = new THREE.Vector3().addVectors(targetPoint, offset);

    // Smoothly animate camera and target together
    new TWEEN.Tween(this.controls.target)
      .to({ x: targetPoint.x, y: targetPoint.y, z: targetPoint.z }, 1000)
      .easing(TWEEN.Easing.Cubic.Out)
      .onUpdate(() => this.controls.update())
      .start();

    new TWEEN.Tween(this.camera.position)
      .to({ x: newCamPos.x, y: newCamPos.y, z: newCamPos.z }, 1000)
      .easing(TWEEN.Easing.Cubic.Out)
      .start();
      
    this.scada.hide(); // Hide panel when moving freely
    this.buttons.forEach(b => b.classList.remove('active')); // Deselect view buttons
  }

  inspectUnit(unit) {
    const id = unit.userData.id;
    const name = unit.userData.name;
    const filename = `unit-${id}.html`;
    const urlName = encodeURIComponent(name);
    window.location.href = `${filename}?name=${urlName}&id=${encodeURIComponent(id)}`;
  }
  focusOnUnit(unit) { const box = new THREE.Box3().setFromObject(unit); const center = box.getCenter(new THREE.Vector3()); const size = box.getSize(new THREE.Vector3()); const maxDim = Math.max(size.x, size.y, size.z); const offset = new THREE.Vector3(maxDim * 1.5, maxDim * 1.2, maxDim * 1.5); new TWEEN.Tween(this.camera.position).to(center.clone().add(offset), 1200).easing(TWEEN.Easing.Cubic.Out).start(); new TWEEN.Tween(this.controls.target).to(center, 1200).easing(TWEEN.Easing.Cubic.Out).onUpdate(() => this.controls.update()).start(); }
  fitToScene() { const box = new THREE.Box3(); this.plantBuilder.units.forEach(unit => box.expandByObject(unit)); const center = box.getCenter(new THREE.Vector3()); new TWEEN.Tween(this.camera.position).to(center.clone().add(new THREE.Vector3(0, 200, 300)), 1500).easing(TWEEN.Easing.Cubic.Out).start(); new TWEEN.Tween(this.controls.target).to(center, 1500).easing(TWEEN.Easing.Cubic.Out).onUpdate(() => this.controls.update()).start(); }
  viewPhase(minX, maxX) { const phaseUnits = this.plantBuilder.units.filter(unit => { return unit.position.x >= minX && unit.position.x <= maxX; }); if (phaseUnits.length > 0) { const box = new THREE.Box3(); phaseUnits.forEach(unit => box.expandByObject(unit)); const center = box.getCenter(new THREE.Vector3()); new TWEEN.Tween(this.camera.position).to(center.clone().add(new THREE.Vector3(0, 150, 200)), 1500).easing(TWEEN.Easing.Cubic.Out).start(); new TWEEN.Tween(this.controls.target).to(center, 1500).easing(TWEEN.Easing.Cubic.Out).onUpdate(() => this.controls.update()).start(); } }
  
  viewSludge() {
    const center = new THREE.Vector3(-45, 0, -100);
    new TWEEN.Tween(this.camera.position).to(center.clone().add(new THREE.Vector3(0, 100, 150)), 1500).easing(TWEEN.Easing.Cubic.Out).start();
    new TWEEN.Tween(this.controls.target).to(center, 1500).easing(TWEEN.Easing.Cubic.Out).onUpdate(() => this.controls.update()).start();
  }

  topView() { const box = new THREE.Box3(); this.plantBuilder.units.forEach(unit => box.expandByObject(unit)); const center = box.getCenter(new THREE.Vector3()); new TWEEN.Tween(this.camera.position).to(center.clone().add(new THREE.Vector3(0, 350, 0)), 1500).easing(TWEEN.Easing.Cubic.Out).start(); new TWEEN.Tween(this.controls.target).to(center, 1500).easing(TWEEN.Easing.Cubic.Out).onUpdate(() => this.controls.update()).start(); }
  sideView() { const box = new THREE.Box3(); this.plantBuilder.units.forEach(unit => box.expandByObject(unit)); const center = box.getCenter(new THREE.Vector3()); new TWEEN.Tween(this.camera.position).to(center.clone().add(new THREE.Vector3(0, 50, 400)), 1500).easing(TWEEN.Easing.Cubic.Out).start(); new TWEEN.Tween(this.controls.target).to(center, 1500).easing(TWEEN.Easing.Cubic.Out).onUpdate(() => this.controls.update()).start(); }
  onResize() { this.camera.aspect = window.innerWidth / window.innerHeight; this.camera.updateProjectionMatrix(); this.renderer.setSize(window.innerWidth, window.innerHeight); this.labelRenderer.setSize(window.innerWidth, window.innerHeight); this.composer.setSize(window.innerWidth, window.innerHeight); }
  animate() { requestAnimationFrame(() => this.animate()); const delta = this.animations.getDelta(); const time = this.animations.getTime(); TWEEN.update(); this.controls.update(); this.flowSystem.update(time, delta); this.animations.update(this.plantBuilder.units, time, delta); this.minimap.update(this.camera); this.composer.render(); this.labelRenderer.render(this.scene, this.camera); }
  showLoader() { const loader = document.createElement('div'); loader.className = 'loader'; loader.id = 'loader'; loader.innerHTML = `<h1>WWTP DIGITAL TWIN</h1><div class="loader-text">Initializing Industrial Simulation...</div><div class="loader-bar"><div class="loader-progress" id="loader-progress"></div></div>`; document.body.appendChild(loader); let progress = 0; const interval = setInterval(() => { progress += Math.random() * 15; if (progress >= 100) { progress = 100; clearInterval(interval); } document.getElementById('loader-progress').style.width = progress + '%'; }, 100); }
  hideLoader() { setTimeout(() => { const loader = document.getElementById('loader'); if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 800); } }, 1500); }
}

// Start the simulation
new WWTPSimulation();

</script>
